name: Deploy designs to GitHub Pages

# Publishes the contents of /designs as a static site whenever they change.
# After the first run, the gallery lives at:
#   https://mrpie95.github.io/intuuk/

on:
  push:
    branches: [main]
    paths:
      - 'designs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, queueing in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload designs/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./designs

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
