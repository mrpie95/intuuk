<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intuuk — Gradient Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f3ef;
    min-height: 100vh;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 0.5rem;
    letter-spacing: -0.5px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: rgba(0,0,0,0.5);
    margin-bottom: 2rem;
  }

  .playground {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    align-items: flex-start;
    max-width: 900px;
    margin: 0 auto;
  }

  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .phone-label {
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .phone {
    width: 280px;
    height: 560px;
    border-radius: 40px;
    border: 1.5px solid rgba(0,0,0,0.08);
    overflow: hidden;
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.12);
  }

  .phone .status {
    position: absolute;
    top: 16px; left: 22px; right: 22px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: white;
    opacity: 0.85;
  }

  .phone .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    padding: 2rem;
    text-align: center;
  }

  .phone .lbl { font-size: 11px; opacity: 0.6; letter-spacing: 0.06em; }
  .phone .num { font-size: 72px; font-weight: 300; line-height: 1; letter-spacing: -3px; margin-top: 2px; }
  .phone .sub { font-size: 11px; opacity: 0.5; margin-top: 6px; }

  .phone .bars { margin-top: 40px; width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .phone .bar { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.18); overflow: hidden; }
  .phone .bar-fill { height: 100%; border-radius: 99px; background: rgba(255,255,255,0.65); }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 280px;
    background: white;
    padding: 20px;
    border-radius: 16px;
    border: 0.5px solid rgba(0,0,0,0.08);
  }

  .control-block { display: flex; flex-direction: column; gap: 10px; }

  .control-title {
    font-size: 10px;
    color: rgba(0,0,0,0.55);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .pad {
    position: relative;
    width: 260px;
    height: 200px;
    border-radius: 12px;
    border: 0.5px solid rgba(0,0,0,0.15);
    background: #fafafa;
    cursor: crosshair;
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }

  .pad .grid-lines {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(0,0,0,0.06) 0.5px, transparent 0.5px),
      linear-gradient(to bottom, rgba(0,0,0,0.06) 0.5px, transparent 0.5px);
    background-size: 25% 25%;
    pointer-events: none;
  }

  .pad .dot {
    position: absolute;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: white;
    border: 2px solid #1a1a1a;
    transform: translate(-50%, -50%);
    pointer-events: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  .pad-readout {
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    font-family: 'SF Mono', Menlo, monospace;
  }

  .palette-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .palette-swatch {
    height: 58px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .palette-swatch:hover { transform: translateY(-1px); }
  .palette-swatch.active { border-color: #1a1a1a; }

  .palette-swatch .pname {
    position: absolute;
    bottom: 6px;
    left: 8px;
    font-size: 10px;
    color: rgba(0,0,0,0.7);
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .slider-row { display: flex; align-items: center; gap: 10px; }
  .slider-row label { font-size: 11px; color: rgba(0,0,0,0.55); white-space: nowrap; width: 52px; }
  .slider-row input { flex: 1; }
  .slider-row span { font-size: 11px; color: rgba(0,0,0,0.4); width: 40px; text-align: right; }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 99px;
    background: rgba(0,0,0,0.1); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #1a1a1a; cursor: pointer;
  }

  .preset-btn {
    font-size: 11px;
    background: rgba(0,0,0,0.05);
    border: 0.5px solid rgba(0,0,0,0.1);
    padding: 6px 10px;
    border-radius: 99px;
    cursor: pointer;
    color: rgba(0,0,0,0.7);
  }
  .preset-btn:hover { background: rgba(0,0,0,0.08); }
  .preset-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .export {
    margin-top: 2rem;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
    background: white;
    padding: 16px;
    border-radius: 12px;
    border: 0.5px solid rgba(0,0,0,0.08);
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px;
    color: rgba(0,0,0,0.7);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .export-title {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    color: rgba(0,0,0,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<h1>Intuuk — Gradient Playground</h1>
<p class="subtitle">drag the light source · try palettes · find the vibe</p>

<div class="playground">

  <div class="phone-col">
    <p class="phone-label">preview</p>
    <div class="phone" id="phone">
      <div class="status"><span>9:41</span><span>●●●</span></div>
      <div class="content">
        <div class="lbl">calories left</div>
        <div class="num" id="num">947</div>
        <div class="sub">of 2,000 goal</div>
        <div class="bars">
          <div class="bar"><div class="bar-fill" style="width:62%;"></div></div>
          <div class="bar"><div class="bar-fill" style="width:40%;"></div></div>
          <div class="bar"><div class="bar-fill" style="width:76%;"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">

    <div class="control-block">
      <div class="control-title">palette</div>
      <div class="palette-grid" id="palettes"></div>
    </div>

    <div class="control-block">
      <div class="control-title">light source position</div>
      <div class="pad" id="pad">
        <div class="grid-lines"></div>
        <div class="dot" id="dot" style="left:50%; top:38%;"></div>
      </div>
      <div class="pad-readout" id="pad-readout">x: 50%  y: 38%</div>
      <div class="preset-row">
        <span class="preset-btn" onclick="setPos(0.5, 0.2)">top</span>
        <span class="preset-btn" onclick="setPos(0.5, 0.5)">center</span>
        <span class="preset-btn" onclick="setPos(0.2, 0.3)">top-left</span>
        <span class="preset-btn" onclick="setPos(0.8, 0.3)">top-right</span>
        <span class="preset-btn" onclick="setPos(0.5, 0.85)">bottom</span>
      </div>
    </div>

    <div class="control-block">
      <div class="control-title">adjustments</div>
      <div class="slider-row">
        <label>spread</label>
        <input type="range" min="20" max="90" value="50" id="spread">
        <span id="spread-out">50%</span>
      </div>
      <div class="slider-row">
        <label>eaten</label>
        <input type="range" min="0" max="2200" value="1053" step="10" id="eaten">
        <span id="eaten-out">1053</span>
      </div>
    </div>

  </div>
</div>

<div class="export">
  <div class="export-title">current gradient (copy for Claude Code)</div>
  <div id="export-code">—</div>
</div>

<script>
const palettes = [
  { name: 'iris',    stops: [['#E8D4F8','#C4A8F0'],['#F0B8D8','#D88CB8'],['#A0B0E8','#5868A8']] },
  { name: 'peach',   stops: [['#FFE4C8','#F8C094'],['#F4A888','#E07860'],['#704838','#281410']] },
  { name: 'mint',    stops: [['#E0F8E4','#A8E0C4'],['#80C8B0','#4898A4'],['#304858','#141C24']] },
  { name: 'coral',   stops: [['#FFE0D8','#FFB8A4'],['#F48074','#D04848'],['#4C1818','#1A0808']] },
  { name: 'aurora',  stops: [['#E4D8F8','#B8A0E8'],['#F0B0C8','#D87098'],['#70A8C8','#305878']] },
  { name: 'dusk',    stops: [['#F8DCB8','#E0A888'],['#C47094','#8048A0'],['#302048','#10081A']] },
  { name: 'seafoam', stops: [['#E8F4F0','#B8E0D8'],['#F0D4B8','#E4A488'],['#5C6888','#1C2038']] },
  { name: 'blush',   stops: [['#FFF0E4','#FAD4C0'],['#F4A8A8','#D8687C'],['#582838','#1C0C14']] },
];

let palette = palettes[0];
let px = 0.5, py = 0.38;
let spread = 50;
let eaten = 1053;
const GOAL = 2000;

function hx(h) { return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function lerp(a, b, t) {
  const [r1,g1,b1]=hx(a),[r2,g2,b2]=hx(b);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

function getPaletteColors() {
  const ratio = Math.min(eaten / GOAL, 1.15);
  const [light, mid, dark] = palette.stops;

  let inner, middle, outer;
  if (ratio < 0.4) {
    const t = ratio / 0.4;
    inner = lerp(light[0], light[1], t);
    middle = lerp(mid[0], light[1], t);
    outer = lerp(mid[1], mid[0], t);
  } else if (ratio < 0.8) {
    const t = (ratio - 0.4) / 0.4;
    inner = lerp(light[1], mid[0], t);
    middle = lerp(mid[0], mid[1], t);
    outer = lerp(mid[1], dark[0], t);
  } else {
    const t = Math.min((ratio - 0.8) / 0.35, 1);
    inner = lerp(mid[0], mid[1], t);
    middle = lerp(mid[1], dark[0], t);
    outer = lerp(dark[0], dark[1], t);
  }

  return { inner, middle, outer };
}

function applyBg() {
  const { inner, middle, outer } = getPaletteColors();
  const midStop = Math.round(spread * 0.8);
  const bg = `radial-gradient(circle at ${(px*100).toFixed(1)}% ${(py*100).toFixed(1)}%, ${inner} 0%, ${middle} ${midStop}%, ${outer} 100%)`;
  document.getElementById('phone').style.background = bg;
  document.getElementById('export-code').textContent =
    `palette: ${palette.name}\nposition: x=${Math.round(px*100)}%, y=${Math.round(py*100)}%\nspread: ${spread}%\neaten: ${eaten} / ${GOAL} kcal\n\ncss:\nbackground: ${bg};`;
}

function renderPalettes() {
  const grid = document.getElementById('palettes');
  grid.innerHTML = '';
  palettes.forEach(p => {
    const sw = document.createElement('div');
    sw.className = 'palette-swatch' + (p === palette ? ' active' : '');
    sw.style.background = `radial-gradient(circle at 30% 30%, ${p.stops[0][0]} 0%, ${p.stops[1][0]} 50%, ${p.stops[2][0]} 100%)`;
    sw.innerHTML = `<span class="pname">${p.name}</span>`;
    sw.onclick = () => { palette = p; renderPalettes(); applyBg(); };
    grid.appendChild(sw);
  });
}

function updateReadout() {
  document.getElementById('pad-readout').textContent = `x: ${Math.round(px*100)}%  y: ${Math.round(py*100)}%`;
}

function updateNum() {
  document.getElementById('num').textContent = Math.max(0, GOAL - eaten).toLocaleString();
}

function setPos(nx, ny) {
  px = nx; py = ny;
  document.getElementById('dot').style.left = (px*100) + '%';
  document.getElementById('dot').style.top = (py*100) + '%';
  updateReadout();
  applyBg();
}

const pad = document.getElementById('pad');
const dot = document.getElementById('dot');

function setFromEvent(e) {
  const rect = pad.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  px = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  py = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
  dot.style.left = (px * 100) + '%';
  dot.style.top = (py * 100) + '%';
  updateReadout();
  applyBg();
}

let dragging = false;
pad.addEventListener('pointerdown', e => { dragging = true; pad.setPointerCapture(e.pointerId); setFromEvent(e); });
pad.addEventListener('pointermove', e => { if (dragging) setFromEvent(e); });
pad.addEventListener('pointerup', () => { dragging = false; });
pad.addEventListener('pointercancel', () => { dragging = false; });

document.getElementById('spread').addEventListener('input', e => {
  spread = parseInt(e.target.value);
  document.getElementById('spread-out').textContent = spread + '%';
  applyBg();
});

document.getElementById('eaten').addEventListener('input', e => {
  eaten = parseInt(e.target.value);
  document.getElementById('eaten-out').textContent = eaten;
  updateNum();
  applyBg();
});

renderPalettes();
applyBg();
updateNum();
</script>
</body>
</html>
